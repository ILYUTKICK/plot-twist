<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="PLOT TWIST — a 48-second TxLINE, Ollama, and Solana fan-experience demo." />
    <title>PLOT TWIST — Demo</title>
    <style>
      :root { color-scheme: dark; --acid: #d8ff3e; --paper: #f2efe8; --ink: #151512; --red: #f15433; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; background: #11110f; color: var(--paper); font: 16px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; }
      main { width: min(1120px, calc(100% - 32px)); margin: 0 auto; padding: 48px 0 56px; }
      header { display: flex; align-items: end; justify-content: space-between; gap: 24px; margin-bottom: 24px; }
      small { color: var(--red); font-weight: 700; letter-spacing: .14em; }
      h1 { margin: 8px 0 0; font: 800 clamp(36px, 6vw, 74px)/.9 Arial, sans-serif; letter-spacing: -.06em; }
      h1 em { color: var(--acid); font-style: normal; }
      header p { max-width: 390px; margin: 0; color: #aaa99f; }
      .frame { border: 1px solid #3a3a35; background: #000; box-shadow: 0 24px 80px #0008; }
      video { display: block; width: 100%; aspect-ratio: 16 / 9; background: #000; }
      footer { display: flex; justify-content: space-between; gap: 20px; margin-top: 22px; color: #aaa99f; font-size: 12px; }
      nav { display: flex; flex-wrap: wrap; gap: 10px; }
      a { padding: 9px 12px; border: 1px solid #494941; color: var(--paper); text-decoration: none; }
      a:first-child { border-color: var(--acid); background: var(--acid); color: var(--ink); }
      @media (max-width: 720px) { main { padding-top: 28px; } header, footer { align-items: start; flex-direction: column; } }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div><small>CONSUMER &amp; FAN EXPERIENCES</small><h1>PLOT <em>TWIST</em></h1></div>
        <p>Verified football events become narrated fan calls and wallet-signed achievements. 48 seconds, with sound.</p>
      </header>
      <div class="frame">
        <video controls playsinline preload="metadata" poster="demo-poster.png">
          <source src="plot-twist-demo.mp4" type="video/mp4" />
          Your browser does not support the video element.
        </video>
      </div>
      <footer>
        <span>AI narrates · TxLINE verifies · Solana remembers</span>
        <nav>
          <a href="https://github.com/ILYUTKICK/plot-twist">Public repository</a>
          <a href="https://explorer.solana.com/tx/2XY2q4xJk9adgBEPXxR8bPXuvGmnNkipd4a7bSejrQXFxB1qq7KqUrMVjwJNat9V9zson4MHBeCVB6EQfjcDAZcM?cluster=devnet">Solana transaction</a>
        </nav>
      </footer>
    </main>
  </body>
</html>
